version: 1
nodes:
  - id: arch-gfmozzer-opensdd
    name: "@gfmozzer/opensdd"
    kind: service
    description: Servico inicial detectado no bootstrap de contexto
    repo_paths:
      - src
    depends_on: []
  - id: FEAT-001
    name: Onboard sugere próximos passos quando backlog vazio
    kind: feature
    description: ""
    repo_paths: []
    depends_on: []
  - id: FEAT-0002
    name: Impacto de renomear RADAR para EPIC
    kind: feature
    description: ""
    repo_paths: []
    depends_on: []
  - id: FEAT-0003
    name: EPIC com IDs SDD em quatro dígitos
    kind: feature
    description: ""
    repo_paths: []
    depends_on: []
  - id: FEAT-0004
    name: Guardrails de estrutura, diretórios e qualidade do SDD
    kind: feature
    description: ""
    repo_paths: []
    depends_on: []
  - id: FEAT-0005
    name: Validar coerencia entre estado logico e localizacao fisica dos artefatos
      SDD
    kind: feature
    description: Implementar verificacao sistematica entre backlog/discovery e a
      localizacao fisica em .sdd/active e .sdd/archived para impedir
      divergencias historicas como features DONE ainda abertas em active.
    repo_paths: []
    depends_on: []
  - id: FEAT-0008
    name: Concluir normalizacao de EPIC como termo canonico nas interfaces e docs SDD
    kind: feature
    description: Fechar a migracao semantica de RAD/RADAR para EPIC em documentacao,
      exemplos, help de comandos e mensagens humanas, preservando apenas
      compatibilidade retroativa onde estritamente necessario.
    repo_paths: []
    depends_on: []
  - id: FEAT-0007
    name: Completar transicao documentada para IDs SDD canonicos de quatro digitos
    kind: feature
    description: "Padronizar a experiencia humana do SDD para IDs no formato #### em
      docs, mensagens, exemplos e orientacoes operacionais, mantendo suporte
      legada apenas como compatibilidade."
    repo_paths: []
    depends_on: []
  - id: FEAT-0009
    name: Gate mandatória de migração SDD
    kind: feature
    description: ""
    repo_paths: []
    depends_on: []
  - id: FEAT-0010
    name: "Debate: Elevar a qualidade automatizada do projeto com foco em cobertura
      unitária máxima viável, definição de cobertura"
    kind: feature
    description: ""
    repo_paths: []
    depends_on: []
  - id: FEAT-0018
    name: Adotar DevTrack Foundation API como backend padrão do OpenSDD
    kind: documentation
    description: ""
    repo_paths: []
    depends_on: []
  - id: FEAT-0011
    name: Ampliar cobertura automatizada nos comandos com lógica real e branches
      relevantes
    kind: feature
    description: Criar testes unitários para validate.ts, spec.ts, change.ts,
      completion.ts e match.ts, atacando branches com lógica real de negócio
      conforme decisão DEB-0007 Opção B.
    repo_paths: []
    depends_on: []
  - id: FEAT-0012
    name: Enriquecer prompts e templates com critérios de qualidade mínima por
      artefato
    kind: feature
    description: Adicionar instruções de geração, critérios de qualidade mínima e
      frases proibidas (placeholders) a cada template e lente do SDD. Garantir
      que artefatos gerados por LLM não possam ser archivados com campos
      Objetivo/Resumo contendo texto de placeholder.
    repo_paths: []
    depends_on: []
  - id: FEAT-0013
    name: Lentes estruturais como bloqueadores reais de transição no TransitionEngine
    kind: feature
    description: Vincular a aprovação de transição de estado à validação obrigatória
      da lente do artefato. Nenhuma transição FEAT→IN_PROGRESS, FEAT→DONE ou
      FEAT→ARCHIVED ocorre sem conformidade 100% da lente. Adicionar flag
      forced_transition rastreável para casos de bypass explícito.
    repo_paths: []
    depends_on:
      - FEAT-0012
  - id: FEAT-0014
    name: Roteamento semântico de skills por domínio da feature
    kind: feature
    description: Substituir a lista genérica de skills (architecture,
      concise-planning, context-window-management) por roteamento baseado no
      domínio declarado na FEAT
      (backend/frontend/infra/testing/architecture/data/full-stack). Criar
      skill-routing.yaml editável e gerar recomendações dinamicamente no
      2-plan.md.
    repo_paths: []
    depends_on: []
  - id: FEAT-0015
    name: ADR mandatório automático para features com impacto arquitetural declarado
    kind: feature
    description: Quando o campo Impacto Arquitetural da FEAT declarar
      requires_adr:true, o comando start cria automaticamente o template
      ADR-FEAT-####.md em .sdd/core/adrs/. O finalize bloqueia se o ADR existir
      mas contiver placeholders. A seção Refs da spec inclui link ao ADR
      automaticamente.
    repo_paths: []
    depends_on: []
  - id: FEAT-0016
    name: Protocolo de meta-evolução do SDD e comando sdd audit
    kind: feature
    description: Implementar ciclo semestral de auditoria do próprio SDD via campo
      meta_evolution em config.yaml e novo subcomando opensdd sdd audit. O
      comando exibe métricas de saúde do ciclo (% artefatos sem placeholder, %
      debates com deliberação real, % ADRs gerados vs esperados, FEATs com
      forced_transition). Não cria INS automaticamente — apenas exibe relatório
      e sugere criação.
    repo_paths: []
    depends_on:
      - FEAT-0012
      - FEAT-0013
      - FEAT-0014
      - FEAT-0015
  - id: FEAT-0017
    name: Sanitização semântica de títulos na propagação INS → DEB → EPIC → FEAT
    kind: feature
    description: Adicionar campo title_canonical (max 60 chars, sem prefixos
      funcionais) nos artefatos INS e DEB. Na transição DEB→EPIC, usar
      title_canonical em vez do título do debate. Adicionar validação no check
      que rejeita EPIC ou FEAT cujo título contenha "Debate:", "Insight:",
      "(preencher" ou "(placeholder".
    repo_paths: []
    depends_on: []
  - id: FEAT-0020
    name: Transition-log append-only e remocao do ciclo ARCHIVED para DONE
    kind: feature
    description: ""
    repo_paths: []
    depends_on: []
  - id: FEAT-0021
    name: Deduplicacao cross-entity em insight debate e decide com warn-and-link
    kind: feature
    description: ""
    repo_paths: []
    depends_on: []
  - id: FEAT-0022
    name: Corrigir heuristica serviceId e merge field-wise no finalize
    kind: feature
    description: ""
    repo_paths: []
    depends_on: []
  - id: FEAT-0019
    name: Integridade referencial cross-entity no check com severidade graduada
    kind: feature
    description: ""
    repo_paths: []
    depends_on: []
