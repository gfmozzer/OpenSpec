  - id: INS-0011
    type: INS
    title: "Robustez estrutural do OpenSDD: dedup, isolamento, integridade e
      auditoria"
    title_canonical: "Robustez estrutural do OpenSDD: dedup, isolamento, integrida"
    status: DEBATED
    origin_prompt: Incrementar a robustez estrutural do OpenSDD contra duplicidade
      de IDs e codigos, fuga de contexto entre projetos, mistura semantica em
      titulos propagados, fragilidade do algoritmo de similaridade, ausencia de
      integridade referencial cross-entity, consolidacao rasa da memoria
      canonica no finalize, falta de auditoria de transicoes de estado e
      cobertura parcial de lentes e validadores. O objetivo e fortalecer a
      capacidade da ferramenta de orquestrar e organizar o desenvolvimento desde
      o insight ate a consolidacao, com barreiras inteligentes contra
      repetibilidade, perda de contexto e degradacao progressiva do estado.
    related_ids:
      - DEB-0011
    warning_links: []
