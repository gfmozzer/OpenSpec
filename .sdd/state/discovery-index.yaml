    status: DEBATED
    origin_prompt: Transformar a arquitetura backend canonica da
      devtrack-foundation-api em contrato operacional obrigatorio do SDD, para
      que projetos backend nascam e evoluam seguindo fielmente a mesma estrutura
      de pacotes, pastas, nomenclatura, camadas, regras e fluxos. O objetivo e
      eliminar erros arquiteturais pequenos e recorrentes, fazendo o OpenSDD
      materializar esse padrao como referencia padrao de bootstrap, ADR,
