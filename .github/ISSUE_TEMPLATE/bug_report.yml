name: Reportar bug
description: Reporte um problema reproduzível no OpenSDD
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Resumo
      description: O que aconteceu?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Passos para reproduzir
      description: Inclua comandos, entradas e contexto suficiente para reproduzir.
      placeholder: |
        1. Rode `...`
        2. Execute `...`
        3. Veja o erro
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs e evidências
      description: Não inclua segredos ou dados privados.
  - type: input
    id: version
    attributes:
      label: Versão do OpenSDD
      placeholder: ex. 1.2.1-rc2
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Versão do Node.js
      placeholder: ex. 20.19.0
  - type: dropdown
    id: os
    attributes:
      label: Sistema operacional
      options:
        - Linux
        - macOS
        - Windows
        - Outro
    validations:
      required: true
